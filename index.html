      <div class="runnit-static">
        <h1>RUNNIT</h1>
        <p>RUNNIT is a GPS training and social fitness platform for endurance athletes — runners, cyclists, triathletes, swimmers, and trail athletes. Available at <strong>runnit.live</strong> and on iOS and Android.</p>

        <h2>What RUNNIT does</h2>
        <ul>
          <li><strong>Track</strong> — GPS activity tracking for runs, rides, swims, hikes, and more. Records splits, route, elevation, pace, and heart rate.</li>
          <li><strong>Train</strong> — AI-powered training plans that adapt to your schedule and fitness level.</li>
          <li><strong>Crews</strong> — Join or create run clubs and training groups to find training partners and share workouts.</li>
          <li><strong>Challenges</strong> — Monthly distance races, segment crowns, and streak challenges.</li>
          <li><strong>Moments</strong> — Share a photo from your workout with auto-stamped distance and pace.</li>
          <li><strong>Live</strong> — Real-time location sharing during activities so your crew can cheer you on.</li>
          <li><strong>Devices</strong> — Sync activities from Garmin and Strava.</li>
        </ul>

        <h2>Data we collect and why</h2>
        <p>When you create a RUNNIT account or sign in with Google, we request the following data:</p>
        <ul>
          <li><strong>Email address</strong> — to create and manage your account, and send transactional emails (password resets, notifications). We do not send unsolicited marketing email.</li>
          <li><strong>Name and profile photo</strong> — to set up your public athlete profile. You can change or remove these at any time from Settings.</li>
          <li><strong>Google account identifier</strong> — to authenticate your session and link your Google account to your RUNNIT profile.</li>
          <li><strong>GPS and activity data</strong> — collected when you use the tracking features. Used to display your training history, calculate metrics, and generate personalized training plans.</li>
        </ul>

        <div class="pledge">
          <strong>Our data pledge:</strong>
          <ul>
            <li>We do not sell your personal data to third parties.</li>
            <li>We do not use your data to serve you advertisements.</li>
            <li>We do not share your data except as required to operate the platform (e.g., cloud hosting) or as required by law.</li>
            <li>You can delete your account and all associated data at any time.</li>
          </ul>
        </div>

        <h2>Privacy Policy</h2>
        <p>For the full details of how we collect, use, store, and protect your data, please read our <a href="/privacy">Privacy Policy</a>.</p>
        <p>Privacy questions: <a href="mailto:privacy@runnit.live">privacy@runnit.live</a></p>

        <h2>Sign in</h2>
        <p>To use RUNNIT, <a href="/join-us">sign in or create an account</a>. You can sign in with Google or with an email and password.</p>
